<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeHive Universal Portal</title>
    <!-- Same font styling architecture for consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Poppins:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface: #ffffff;
            --background: #f4f7f6;
            --primary: #E63946;
            --text-primary: #1F2937;
            --text-secondary: #4B5563;
        }

        body {
            margin: 0;
            background: var(--background);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: var(--surface);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            position: relative;
            text-align: center;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .title {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            color: var(--text-primary);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .submit-btn:hover {
            background: #D62A37;
            transform: translateY(-2px);
        }

        .toggle-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .toggle-text:hover {
            color: var(--primary);
        }

        .error-msg {
            color: #EF4444;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 500;
        }

    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">HomeHive</div>
        <div class="title" id="portalTitle">Sign in to your account</div>
        
        <div class="error-msg" id="errorMsg">Authentication Failed</div>

        <form id="loginForm">
            <div class="input-group" id="nameGroup" style="display:none;">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Enter Dashboard</button>
        </form>

        <div class="toggle-text" id="toggleText" onclick="toggleMode()">Brand new? Create an Account</div>
    </div>

    <!-- Integrate the API handler -->
    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('hh_token');
            if (savedToken) {
                try {
                    const base64Url = savedToken.split('.')[1];
                    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    while(base64.length % 4 !== 0) base64 += '=';
                    const payload = JSON.parse(atob(base64)); // simple payload read
                    if (payload.role === 'admin') {
                        localStorage.setItem('hh_admin_token', savedToken);
                        window.location.replace('admin.html');
                    } else {
                        window.location.replace('home.html');
                    }
                } catch(e) { }
            }
        });

        let isLoginMode = true;

        window.toggleMode = function() {
            isLoginMode = !isLoginMode;
            document.getElementById('portalTitle').innerText = isLoginMode ? 'Sign in to your account' : 'Create HomeHive Account';
            document.getElementById('nameGroup').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('name').required = !isLoginMode;
            document.getElementById('submitBtn').innerText = isLoginMode ? 'Enter Dashboard' : 'Register Account';
            document.getElementById('toggleText').innerText = isLoginMode ? "Brand new? Create an Account" : "Already have an account? Sign in";
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            
            try {
                const endpoint = isLoginMode ? '/auth/login' : '/auth/signup';
                const payloadBuilder = isLoginMode ? { email, password } : { name, email, password };
                
                const res = await api.post(endpoint, payloadBuilder);
                
                if (res.token) {
                    localStorage.setItem('hh_token', res.token);
                    
                    // Decode Identity Layer mathematically with strict Base64 Padding injection
                    const base64Url = res.token.split('.')[1];
                    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    while (base64.length % 4 !== 0) {
                        base64 += '=';
                    }
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    const payload = JSON.parse(jsonPayload);
                    
                    // Physical routing intersection based on Role authorization
                    if (payload.role === 'admin') {
                        localStorage.setItem('hh_admin_token', res.token);
                        window.location.replace('admin.html');
                    } else {
                        window.location.replace('home.html');
                    }
                }
            } catch (err) {
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.innerText = err.message || "Failed to route cleanly";
                errorDiv.style.opacity = 1;
                setTimeout(() => errorDiv.style.opacity = 0, 3000);
            }
        });
    </script>
</body>
</html>
